name: build

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_MAKE_VERSION: "0.37.18"
  FDEV_VERSION: "0.3.212"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install GNU tar
        run: |
          if ! tar --version | grep -qi 'gnu tar'; then
            sudo apt-get update && sudo apt-get install -y tar
          fi
      - name: Cache cargo-installed binaries
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/cargo-binstall
            ~/.cargo/bin/fdev
          key: ${{ runner.os }}-cargo-bins-make-${{ env.CARGO_MAKE_VERSION }}-fdev-${{ env.FDEV_VERSION }}
      - name: Install cargo-binstall
        if: steps.cache-bins.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@cargo-binstall
      - name: Install cargo-make + fdev
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: |
          cargo binstall -y --force --version ${{ env.CARGO_MAKE_VERSION }} cargo-make
          cargo binstall -y --force --version ${{ env.FDEV_VERSION }} fdev || \
            cargo install fdev --version ${{ env.FDEV_VERSION }} --locked
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: fmt check
        run: cargo make fmt-check
      - name: build
        run: cargo make build
      - name: clippy
        run: cargo make clippy
      - name: test
        run: cargo make test

  ui-playwright-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            web/tests/package-lock.json
      - name: Cache cargo-installed binaries
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-make
            ~/.cargo/bin/cargo-binstall
            ~/.cargo/bin/fdev
          key: ${{ runner.os }}-cargo-bins-make-${{ env.CARGO_MAKE_VERSION }}-fdev-${{ env.FDEV_VERSION }}-playwright
      - name: Install cargo-binstall
        if: steps.cache-bins.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@cargo-binstall
      - name: Install cargo-make + fdev
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: |
          cargo binstall -y --force --version ${{ env.CARGO_MAKE_VERSION }} cargo-make
          cargo binstall -y --force --version ${{ env.FDEV_VERSION }} fdev || \
            cargo install fdev --version ${{ env.FDEV_VERSION }} --locked
      - name: Build offline UI
        run: cargo make build-ui-offline
      - name: Install Playwright npm deps
        run: npm install
        working-directory: web/tests
      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-1.48.0-chromium-firefox-webkit
      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: web/tests
      - name: Install Playwright system deps (cache hit path)
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit
        working-directory: web/tests
      - name: Run Playwright
        run: cargo make test-ui-playwright
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/tests/playwright-report
            web/tests/test-results
          retention-days: 14
