[config]
skip_core_tasks = true
default_to_workspace = false

[env]
CONTRACT_TARGET = "wasm32-unknown-unknown"
BUILD_PROFILE = "release"

[tasks.clean]
description = "Clean build artifacts + generated files"
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
cargo clean
rm -rf "$ROOT/web/dist" "$ROOT/web/build" "$ROOT/build" "$ROOT/target/webapp"
rm -f "$ROOT/web/user_shard_code_hash.txt" "$ROOT/web/thread_shard_code_hash.txt" \
      "$ROOT/web/global_index_shard_code_hash.txt" \
      "$ROOT/web/public/user_shard.wasm" "$ROOT/web/public/thread_shard.wasm" \
      "$ROOT/web/public/global_index_shard.wasm" \
      "$ROOT/web/delegate_key.txt" \
      "$ROOT/web/delegate_key_bytes.json" "$ROOT/web/delegate_code_hash_bytes.json"
'''

[tasks.default]
alias = "build"

[tasks.build-user-shard]
description = "Build user-shard contract WASM + code_hash"
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
cd "$ROOT/contracts/user-shard"
CARGO_TARGET_DIR="$ROOT/target" fdev build
# Mirror the RAW wasm + code hash into web/ and verify b3sum == code hash.
# User shards are PARAMETERIZED (parameters = owner ML-DSA-65 VK): no single
# instance id, each owner derives a distinct key at runtime. See the helper for
# why the RAW (not packaged) wasm must ship. __USER_SHARD_CODE_HASH__ is injected
# from web/user_shard_code_hash.txt by vite.
bash "$ROOT/scripts/mirror-shard-wasm.sh" "$ROOT" freenet_microblogging_user_shard user_shard
'''

[tasks.build-thread-shard]
description = "Build thread-shard contract WASM + code_hash"
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
cd "$ROOT/contracts/thread-shard"
CARGO_TARGET_DIR="$ROOT/target" fdev build
# Mirror the RAW wasm + code hash into web/ and verify b3sum == code hash.
# Thread shards are PARAMETERIZED (parameters = root post id): no single instance
# id, each thread derives a distinct key at runtime. __THREAD_SHARD_CODE_HASH__
# is injected from web/thread_shard_code_hash.txt by vite.
bash "$ROOT/scripts/mirror-shard-wasm.sh" "$ROOT" freenet_microblogging_thread_shard thread_shard
'''

[tasks.build-global-index-shard]
description = "Build global-index-shard contract WASM + code_hash"
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
cd "$ROOT/contracts/global-index-shard"
CARGO_TARGET_DIR="$ROOT/target" fdev build
# Mirror the RAW wasm + code hash into web/ and verify b3sum == code hash.
# The global index is a fixed-key SINGLETON (parameters = empty bytes): one
# instance for the whole network, key blake3(code_hash || <empty>), derived in
# the web app at runtime. We still ship the RAW wasm like user/thread (NOT the
# inbox build-only pattern) because the web app PUTs the singleton container on
# demand to instantiate it. __GLOBAL_INDEX_SHARD_CODE_HASH__ is injected from
# web/global_index_shard_code_hash.txt by vite.
bash "$ROOT/scripts/mirror-shard-wasm.sh" "$ROOT" freenet_microblogging_global_index_shard global_index_shard
'''

[tasks.build-inbox-shard]
description = "Build inbox-shard contract WASM + code_hash"
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
cd "$ROOT/contracts/inbox-shard"
CARGO_TARGET_DIR="$ROOT/target" fdev build
hash=$(CARGO_TARGET_DIR="$ROOT/target" fdev inspect \
    "$ROOT/contracts/inbox-shard/build/freenet/freenet_microblogging_inbox_shard" code | \
    grep 'code hash:' | cut -d' ' -f3)
mkdir -p "$ROOT/build"
# Inbox shards are PARAMETERIZED (parameters = owner VK bytes), so there is no
# single contract instance id: each owner derives a distinct key from this
# code_hash + their VK. Only the code_hash is build-stable; instance ids are
# computed per owner at runtime (ADR-0001 → "Inbox shard").
printf '%s' "$hash" > "$ROOT/build/inbox_shard_code_hash"
echo "wrote build/inbox_shard_code_hash: $hash"
'''

[tasks.build-identity]
description = "Build identity delegate WASM + code_hash + delegate_key bytes"
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
cd "$ROOT/delegates/identity"
CARGO_TARGET_DIR="$ROOT/target" fdev build --package-type delegate
hash=$(CARGO_TARGET_DIR="$ROOT/target" fdev inspect \
    "$ROOT/delegates/identity/build/freenet/freenet_microblogging_identity" delegate | \
    grep 'code hash:' | cut -d' ' -f3)
mkdir -p "$ROOT/build"
printf '%s' "$hash" > "$ROOT/build/identity_code_hash"
# Preserve legacy delegate-key derivation that the UI consumes.
WASM="$ROOT/target/wasm32-unknown-unknown/release/freenet_microblogging_identity.wasm"
code_hash_hex=$(b3sum --no-names "$WASM" | tr -d '[:space:]')
key_hex=$(echo -n "$code_hash_hex" | xxd -r -p | b3sum --no-names | tr -d '[:space:]')
node -e "console.log(JSON.stringify(Array.from(Buffer.from(process.argv[1],'hex'))))" \
    "$key_hex" > "$ROOT/web/delegate_key_bytes.json"
node -e "console.log(JSON.stringify(Array.from(Buffer.from(process.argv[1],'hex'))))" \
    "$code_hash_hex" > "$ROOT/web/delegate_code_hash_bytes.json"
printf '%s' "$key_hex" > "$ROOT/web/delegate_key.txt"
echo "identity hash=$hash key=$key_hex"
'''

[tasks.build-contracts]
description = "Build all contracts + delegates (WASM + code_hash files)"
dependencies = ["build-user-shard", "build-thread-shard", "build-global-index-shard", "build-inbox-shard", "build-identity"]

[tasks.build-web-container]
description = "Build web/container Rust crate (WASM)"
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
cargo build --profile "${BUILD_PROFILE}" --target "${CONTRACT_TARGET}" \
    -p freenet-microblogging-web --features freenet-main-contract
# Cargo cdylib output ends up at release/<name>.wasm on Linux but only at
# release/deps/<name>.wasm on macOS for this crate config. Ensure the
# conventional release/ path exists so downstream tasks (sign-webapp,
# update-published-contract) can find it on either OS.
SRC="$ROOT/target/${CONTRACT_TARGET}/release/deps/freenet_microblogging_web.wasm"
DST="$ROOT/target/${CONTRACT_TARGET}/release/freenet_microblogging_web.wasm"
if [ -f "$DST" ]; then
    echo "$DST already at conventional path ($(wc -c < "$DST") bytes)"
elif [ -f "$SRC" ]; then
    cp "$SRC" "$DST"
    echo "wrote $DST ($(wc -c < "$DST") bytes)"
else
    echo "error: web container WASM not found at $SRC or $DST" >&2
    exit 1
fi
'''

[tasks.build-ui]
description = "Build the Vite/TypeScript web UI"
dependencies = ["build-contracts"]
script_runner = "bash"
script = '''
set -euo pipefail
cd "${CARGO_MAKE_WORKING_DIRECTORY}/web"
npm install
npm run build
'''

[tasks.build]
description = "Full build: contracts + UI + web container"
dependencies = ["build-ui", "build-web-container"]

[tasks.test]
description = "Run all tests (Rust workspace + Vitest)"
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
# Whole workspace so every contract, the common crate, and the identity delegate
# are exercised — not a hand-maintained subset (the user/thread shards and the
# delegate were previously omitted here and only ran in ad-hoc cargo test calls).
cargo test --workspace
cd "$ROOT/web" && npm test
'''

[tasks.clippy]
description = "Run clippy on all packages, deny warnings"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--", "-D", "warnings"]

[tasks.check]
description = "Type check: cargo check + tsc --noEmit"
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
cargo check --workspace
cd "$ROOT/web" && npx tsc --noEmit
'''

[tasks.fmt-check]
description = "cargo fmt --check"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.run-node]
description = "Run local Freenet node"
script_runner = "bash"
script = '''
RUST_BACKTRACE=1 RUST_LOG=freenet=debug,freenet_core=debug,info \
    freenet local --ws-api-address 127.0.0.1
'''

[tasks.build-ui-offline]
description = "Vite build in offline mode (mock data, no node) — for CI/Playwright"
dependencies = ["build-contracts"]
script_runner = "bash"
script = '''
set -euo pipefail
cd "${CARGO_MAKE_WORKING_DIRECTORY}/web"
npm install
npm run build:offline
'''

[tasks.dev-offline]
description = "Vite dev server in offline mode"
script_runner = "bash"
script = '''
cd "${CARGO_MAKE_WORKING_DIRECTORY}/web" && npm run dev:offline
'''

[tasks.test-identity]
description = "Run identity delegate tests"
command = "cargo"
args = ["test", "-p", "freenet-microblogging-identity"]

[tasks.test-web]
description = "Run Vitest suite"
script_runner = "bash"
script = '''
cd "${CARGO_MAKE_WORKING_DIRECTORY}/web" && npm test
'''

[tasks.generate-web-container-keys]
description = "Generate fresh ed25519 keypair for the web-container test signer"
script_runner = "bash"
script = '''
set -euo pipefail
KEY_FILE="${CARGO_MAKE_WORKING_DIRECTORY}/test-contract/web-container-keys.toml"
if [ -f "$KEY_FILE" ]; then
    echo "$KEY_FILE already exists; remove it first to rotate the test key" >&2
    exit 1
fi
mkdir -p "$(dirname "$KEY_FILE")"
cargo run --quiet -p web-container-sign -- generate --output "$KEY_FILE"
echo "wrote $KEY_FILE — commit it"
'''

[tasks.compress-webapp]
description = "Compress built UI into target/webapp/webapp.tar.xz (reproducible)"
dependencies = ["build-ui"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
DIST="$ROOT/web/dist"
if [ ! -d "$DIST" ]; then
    echo "error: $DIST not found (did build-ui run?)" >&2
    exit 1
fi
mkdir -p "$ROOT/target/webapp"
# Reproducibility: --sort=name + fixed --mtime + --owner/--group=0 + --numeric-owner
# require GNU tar. macOS: `brew install gnu-tar` for `gtar`.
if command -v gtar >/dev/null 2>&1; then
    TAR=gtar
elif tar --version 2>/dev/null | grep -qi 'gnu tar'; then
    TAR=tar
else
    echo "warning: GNU tar not found — archive will NOT be byte-identical across machines." >&2
    echo "         Install gnu-tar for reproducible builds (macOS: brew install gnu-tar)." >&2
    TAR=""
fi
if [ -n "$TAR" ]; then
    "$TAR" --sort=name \
        --mtime='2024-01-01 00:00:00 UTC' \
        --owner=0 --group=0 --numeric-owner \
        -C "$DIST" \
        -cJf "$ROOT/target/webapp/webapp.tar.xz" .
else
    tar -C "$DIST" -cJf "$ROOT/target/webapp/webapp.tar.xz" .
fi
echo "wrote $ROOT/target/webapp/webapp.tar.xz ($(wc -c < "$ROOT/target/webapp/webapp.tar.xz") bytes)"
'''

[tasks.sign-webapp-test]
description = "Sign the compressed webapp with the committed test key"
dependencies = ["compress-webapp"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
KEY_FILE="$ROOT/test-contract/web-container-keys.toml"
if [ ! -f "$KEY_FILE" ]; then
    echo "error: $KEY_FILE not found — run \`cargo make generate-web-container-keys\` first" >&2
    exit 1
fi
# Monotonic version (see sign-webapp): the contract rejects non-increasing
# updates. Commit count is monotonic with history; never use commit-hash bits
# (random → can decrease → UPDATE rejected on a persistent local node). Honour
# WEBAPP_VERSION when an explicit value is wanted.
if [ -n "${WEBAPP_VERSION:-}" ]; then
    version="$WEBAPP_VERSION"
    version_src="WEBAPP_VERSION"
else
    version=$(git -C "$ROOT" rev-list --count HEAD)
    version_src="commit count"
fi
if [ "$version" -le 0 ]; then version=1; fi
echo "signing TEST webapp, version $version (from $version_src)"
cargo run --quiet -p web-container-sign -- sign \
    --input "$ROOT/target/webapp/webapp.tar.xz" \
    --output "$ROOT/target/webapp/webapp.metadata" \
    --parameters "$ROOT/target/webapp/webapp.parameters" \
    --version "$version" \
    --key-file "$KEY_FILE"
'''

[tasks.sign-webapp]
description = "Sign the compressed webapp with the PRODUCTION key"
dependencies = ["compress-webapp"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
KEY_FILE="${WEB_CONTAINER_KEY_FILE:-$HOME/.config/freenet-microblogging/web-container-keys.toml}"
if [ ! -f "$KEY_FILE" ]; then
    echo "error: production key file not found at $KEY_FILE" >&2
    echo >&2
    echo "generate one out of band with:" >&2
    echo "  scripts/generate-production-key.sh" >&2
    echo >&2
    echo "or override with:" >&2
    echo "  WEB_CONTAINER_KEY_FILE=/path/to/keys.toml cargo make sign-webapp" >&2
    exit 1
fi
# The on-chain web-container contract enforces a monotonically increasing
# version (web/container/src/lib.rs: `new_version <= current_version` is
# rejected with InvalidUpdate). The signing version MUST therefore never go
# backwards between releases. scripts/release.sh derives it from the release
# semver and exports WEBAPP_VERSION; honour that when present.
#
# Fallback (manual/dev sign with no WEBAPP_VERSION): use the linear commit
# count, which is monotonic with history. NEVER fall back to commit-hash bits
# — those are effectively random and let release N+1 sign a LOWER version than
# release N, which the contract silently rejects and the publish never lands.
if [ -n "${WEBAPP_VERSION:-}" ]; then
    version="$WEBAPP_VERSION"
    version_src="WEBAPP_VERSION (release semver)"
else
    version=$(git -C "$ROOT" rev-list --count HEAD)
    version_src="commit count (dev fallback)"
fi
if [ "$version" -le 0 ]; then version=1; fi
echo "signing with PRODUCTION key at $KEY_FILE, version $version (from $version_src)"
cargo run --quiet -p web-container-sign -- sign \
    --input "$ROOT/target/webapp/webapp.tar.xz" \
    --output "$ROOT/target/webapp/webapp.metadata" \
    --parameters "$ROOT/target/webapp/webapp.parameters" \
    --version "$version" \
    --key-file "$KEY_FILE"
'''

[tasks.update-published-contract]
description = "Copy signed TEST artifacts into published-contract/ and record contract ID"
dependencies = ["sign-webapp-test", "build-web-container"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
WASM="$ROOT/target/wasm32-unknown-unknown/release/freenet_microblogging_web.wasm"
PARAMS="$ROOT/target/webapp/webapp.parameters"
[ -f "$WASM" ]   || { echo "error: $WASM not found"   >&2; exit 1; }
[ -f "$PARAMS" ] || { echo "error: $PARAMS not found" >&2; exit 1; }
contract_id=$(CARGO_TARGET_DIR="$ROOT/target" fdev get-contract-id \
    --code "$WASM" --parameters "$PARAMS")
[ -n "$contract_id" ] || { echo "error: empty contract id from fdev" >&2; exit 1; }
mkdir -p "$ROOT/published-contract"
cp "$WASM"   "$ROOT/published-contract/web_container_contract.wasm"
cp "$PARAMS" "$ROOT/published-contract/webapp.parameters"
printf '%s\n' "$contract_id" > "$ROOT/published-contract/contract-id.txt"
echo "published-contract/ updated:"
echo "  contract-id.txt              = $contract_id"
echo "  web_container_contract.wasm  = $(wc -c < "$ROOT/published-contract/web_container_contract.wasm") bytes"
echo "  webapp.parameters            = $(wc -c < "$ROOT/published-contract/webapp.parameters") bytes"
'''

[tasks.update-published-contract-prod]
description = "Copy signed PRODUCTION artifacts into published-contract/ and record contract ID"
dependencies = ["sign-webapp", "build-web-container"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
WASM="$ROOT/target/wasm32-unknown-unknown/release/freenet_microblogging_web.wasm"
PARAMS="$ROOT/target/webapp/webapp.parameters"
[ -f "$WASM" ]   || { echo "error: $WASM not found"   >&2; exit 1; }
[ -f "$PARAMS" ] || { echo "error: $PARAMS not found" >&2; exit 1; }
contract_id=$(CARGO_TARGET_DIR="$ROOT/target" fdev get-contract-id \
    --code "$WASM" --parameters "$PARAMS")
[ -n "$contract_id" ] || { echo "error: empty contract id from fdev" >&2; exit 1; }
mkdir -p "$ROOT/published-contract"
cp "$WASM"   "$ROOT/published-contract/web_container_contract.wasm"
cp "$PARAMS" "$ROOT/published-contract/webapp.parameters"
printf '%s\n' "$contract_id" > "$ROOT/published-contract/contract-id.txt"
echo "published-contract/ updated (PRODUCTION):"
echo "  contract-id.txt              = $contract_id"
'''

[tasks.publish-identity]
description = "Publish identity delegate to local node"
dependencies = ["build-identity"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
fdev publish \
    --code "$ROOT/delegates/identity/build/freenet/freenet_microblogging_identity" \
    delegate
'''

[tasks.publish-webapp-test]
description = "Publish the test-signed webapp from published-contract/ to a local node"
dependencies = ["sign-webapp-test", "build-web-container"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
[ -f "$ROOT/published-contract/contract-id.txt" ] || {
    echo "error: published-contract/contract-id.txt missing — run \`cargo make update-published-contract\` first" >&2
    exit 1
}
echo "publishing test webapp (contract id: $(cat "$ROOT/published-contract/contract-id.txt"))"
fdev publish \
    --code "$ROOT/published-contract/web_container_contract.wasm" \
    --parameters "$ROOT/published-contract/webapp.parameters" \
    contract \
    --webapp-archive "$ROOT/target/webapp/webapp.tar.xz" \
    --webapp-metadata "$ROOT/target/webapp/webapp.metadata"
'''

[tasks.publish-webapp]
description = "Publish the PRODUCTION-signed webapp from published-contract/ to Freenet"
dependencies = ["sign-webapp", "build-web-container"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
[ -f "$ROOT/published-contract/contract-id.txt" ] || {
    echo "error: published-contract/contract-id.txt missing" >&2
    exit 1
}
echo "publishing PRODUCTION webapp (contract id: $(cat "$ROOT/published-contract/contract-id.txt"))"
fdev publish \
    --code "$ROOT/published-contract/web_container_contract.wasm" \
    --parameters "$ROOT/published-contract/webapp.parameters" \
    contract \
    --webapp-archive "$ROOT/target/webapp/webapp.tar.xz" \
    --webapp-metadata "$ROOT/target/webapp/webapp.metadata"
'''

[tasks.publish-all]
description = "End-to-end test publish: build → sign → snapshot → publish-webapp-test"
dependencies = [
    "build",
    "update-published-contract",
    "publish-identity",
    "publish-webapp-test",
]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
PORT="${FREENET_NODE_PORT:-7509}"
CID=$(cat "$ROOT/published-contract/contract-id.txt")
URL="http://127.0.0.1:${PORT}/v1/contract/web/${CID}/"
echo
echo "──────────────────────────────────────────────────────────────"
echo "  Webapp published. Open in browser:"
echo
echo "  $URL"
echo "──────────────────────────────────────────────────────────────"
'''

[tasks.publish-production]
description = "End-to-end PRODUCTION publish (use scripts/release.sh, not directly)"
dependencies = [
    "build",
    "update-published-contract-prod",
    "publish-webapp",
]

[tasks.test-ui-playwright-setup]
description = "Install Playwright browsers (one-time setup)"
script_runner = "bash"
script = '''
cd "${CARGO_MAKE_WORKING_DIRECTORY}/web/tests" && \
    npm install && \
    npx playwright install chromium firefox webkit
'''

[tasks.test-ui-playwright]
description = "Build offline UI, start preview server, run Playwright, tear down"
dependencies = ["build-ui-offline"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
PORT=8082

cd "$ROOT/web" && npx vite preview --port "$PORT" --strictPort &
VITE_PID=$!
trap "kill $VITE_PID 2>/dev/null || true" EXIT

echo "Waiting for preview server on :$PORT..."
ready=false
for _ in $(seq 1 60); do
    if curl -fsS "http://localhost:$PORT/" >/dev/null 2>&1; then
        ready=true
        break
    fi
    sleep 2
done
if [ "$ready" != "true" ]; then
    echo "ERROR: preview server failed to start within 120s" >&2
    exit 1
fi

cd "$ROOT/web/tests" && BASE_URL="http://localhost:$PORT" npx playwright test
'''

[tasks.clean-node]
description = "Wipe local Freenet node state (macOS paths). Stop the node first."
script_runner = "bash"
script = '''
set -euo pipefail
rm -rf "$HOME/Library/Application Support/The-Freenet-Project-Inc.Freenet"
rm -rf "$HOME/Library/Caches/The-Freenet-Project-Inc.freenet"
echo "wiped local Freenet node state"
'''

[tasks.republish-fresh]
description = "Wipe node state then run publish-all. Stop run-node first, then restart it before this."
dependencies = ["clean-node", "publish-all"]

# ─── Facade contract (issue #45): stable bookmarkable URL across releases ────
#
# The facade is a contract whose id stays stable; its signed state points at the
# CURRENT web-container's contract id. Users bookmark the facade URL; each
# release flips the pointer via UPDATE. The facade crates live OUTSIDE the
# workspace (own Cargo.lock) so dep churn can't rotate the facade wasm bytes.
#
# Facade pointer version: reuse WEBAPP_VERSION (the packed-semver the release
# driver signs the web container with) so the facade advances in lockstep with
# releases. Standalone/dev signs fall back to the monotonic commit count — never
# a wall-clock or random value.

[tasks.build-facade-loader]
description = "Render the facade loader HTML with a baked CURRENT_APP_ID (defaults to the committed contract id)"
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
APP_ID="${FACADE_CURRENT_APP_ID:-}"
if [ -z "$APP_ID" ]; then
    if [ ! -f "$ROOT/published-contract/contract-id.txt" ]; then
        echo "error: FACADE_CURRENT_APP_ID unset and published-contract/contract-id.txt missing" >&2
        echo "       run \`cargo make update-published-contract\` first or set FACADE_CURRENT_APP_ID" >&2
        exit 1
    fi
    APP_ID=$(cat "$ROOT/published-contract/contract-id.txt")
fi
bash "$ROOT/scripts/build-loader.sh" "$APP_ID"
'''

[tasks.build-facade]
description = "Build the facade contract WASM (stable across releases; own workspace + Cargo.lock)"
dependencies = ["build-facade-loader"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
# Build against the facade-local manifest with its own target/ so the wasm is
# co-located with its lockfile and never pollutes the workspace target/.
cd "$ROOT/contracts/facade"
cargo build --profile "${BUILD_PROFILE}" --target "${CONTRACT_TARGET}" \
    --no-default-features --features freenet-main-contract
'''

[tasks.pack-facade-loader]
description = "Pack the rendered facade loader (dist/index.html) into a tar.xz the gateway serves as a webapp"
dependencies = ["build-facade-loader"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
APP_ID="${FACADE_CURRENT_APP_ID:-$(cat "$ROOT/published-contract/contract-id.txt")}"
DIST_DIR="$ROOT/contracts/facade-loader/dist"
LOADER_HTML="$DIST_DIR/index.html"
if [ ! -f "$LOADER_HTML" ]; then
    echo "error: $LOADER_HTML missing (build-facade-loader should have produced it)" >&2
    exit 1
fi
# Sanity: the rendered HTML MUST embed the current_app_id we're about to sign
# over, otherwise the facade pointer redirects users to a different app than the
# loader actually fetches.
if ! grep -q "$APP_ID" "$LOADER_HTML"; then
    echo "error: $LOADER_HTML does not embed current_app_id '$APP_ID'." >&2
    echo "       Re-render with: FACADE_CURRENT_APP_ID=$APP_ID cargo make build-facade-loader" >&2
    exit 1
fi
mkdir -p "$ROOT/target/facade"
# GNU tar for reproducibility (matches compress-webapp). The gateway's
# WebApp::try_from runs XzDecoder → tar.unpack over these bytes.
if command -v gtar >/dev/null 2>&1; then
    TAR=gtar
elif tar --version 2>/dev/null | grep -qi 'gnu tar'; then
    TAR=tar
else
    echo "warning: GNU tar not found — facade loader archive will not be byte-identical" >&2
    echo "         across machines (signing is per-build anyway)." >&2
    TAR=""
fi
OUT="$ROOT/target/facade/loader.tar.xz"
if [ -n "$TAR" ]; then
    "$TAR" --sort=name --mtime='2024-01-01 00:00:00 UTC' \
        --owner=0 --group=0 --numeric-owner \
        -C "$DIST_DIR" -cJf "$OUT" index.html
else
    tar -C "$DIST_DIR" -cJf "$OUT" index.html
fi
echo "wrote $OUT ($(wc -c < "$OUT") bytes)"
'''

[tasks.sign-facade-state-test]
description = "Sign a facade state blob with the committed TEST key (current_app_id from published-contract)"
dependencies = ["pack-facade-loader"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
KEY_FILE="$ROOT/test-contract/web-container-keys.toml"
if [ ! -f "$KEY_FILE" ]; then
    echo "error: $KEY_FILE not found — run \`cargo make generate-web-container-keys\`" >&2
    exit 1
fi
APP_ID="${FACADE_CURRENT_APP_ID:-$(cat "$ROOT/published-contract/contract-id.txt")}"
LOADER="$ROOT/target/facade/loader.tar.xz"
[ -f "$LOADER" ] || { echo "error: $LOADER missing (pack-facade-loader should have produced it)" >&2; exit 1; }
if [ -n "${WEBAPP_VERSION:-}" ]; then version="$WEBAPP_VERSION"; else version=$(git -C "$ROOT" rev-list --count HEAD); fi
mkdir -p "$ROOT/target/facade"
cargo run --quiet -p web-container-sign -- sign-facade-state \
    --loader "$LOADER" --current-app-id "$APP_ID" --version "$version" \
    --key-file "$KEY_FILE" \
    --output "$ROOT/target/facade/facade.state" \
    --parameters "$ROOT/target/facade/facade.parameters"
echo "TEST facade state signed at version $version pointing at $APP_ID"
'''

[tasks.sign-facade-state]
description = "Sign a facade state blob with the PRODUCTION key (current_app_id from published-contract)"
dependencies = ["pack-facade-loader"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
KEY_FILE="${WEB_CONTAINER_KEY_FILE:-$HOME/.config/freenet-microblogging/web-container-keys.toml}"
if [ ! -f "$KEY_FILE" ]; then
    echo "error: production key file not found at $KEY_FILE" >&2
    echo "       generate one out of band with scripts/generate-production-key.sh" >&2
    exit 1
fi
APP_ID="${FACADE_CURRENT_APP_ID:-$(cat "$ROOT/published-contract/contract-id.txt")}"
LOADER="$ROOT/target/facade/loader.tar.xz"
[ -f "$LOADER" ] || { echo "error: $LOADER missing (pack-facade-loader should have produced it)" >&2; exit 1; }
if [ -n "${WEBAPP_VERSION:-}" ]; then version="$WEBAPP_VERSION"; else version=$(git -C "$ROOT" rev-list --count HEAD); fi
mkdir -p "$ROOT/target/facade"
cargo run --quiet -p web-container-sign -- sign-facade-state \
    --loader "$LOADER" --current-app-id "$APP_ID" --version "$version" \
    --key-file "$KEY_FILE" \
    --output "$ROOT/target/facade/facade.state" \
    --parameters "$ROOT/target/facade/facade.parameters"
echo "PRODUCTION facade state signed at version $version pointing at $APP_ID"
'''

[tasks.update-published-facade]
description = "Refresh published-contract/facade.{wasm,parameters} + facade-id.txt from a fresh facade build"
dependencies = ["build-facade", "sign-facade-state-test"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
WASM="$ROOT/contracts/facade/target/${CONTRACT_TARGET}/release/freenet_microblogging_facade.wasm"
PARAMS="$ROOT/target/facade/facade.parameters"
[ -f "$WASM" ]   || { echo "error: $WASM not found" >&2; exit 1; }
[ -f "$PARAMS" ] || { echo "error: $PARAMS not found" >&2; exit 1; }
contract_id=$(CARGO_TARGET_DIR="$ROOT/target" fdev get-contract-id --code "$WASM" --parameters "$PARAMS")
[ -n "$contract_id" ] || { echo "error: fdev get-contract-id returned empty id" >&2; exit 1; }
mkdir -p "$ROOT/published-contract"
cp "$WASM"   "$ROOT/published-contract/facade.wasm"
cp "$PARAMS" "$ROOT/published-contract/facade.parameters"
printf '%s\n' "$contract_id" > "$ROOT/published-contract/facade-id.txt"
echo "published-contract/ facade refreshed:"
echo "  facade-id.txt    = $contract_id"
echo "  facade.wasm      = $(wc -c < "$ROOT/published-contract/facade.wasm") bytes"
echo ""
echo "NOTE: facade-id.txt MUST stay stable across releases. If this id differs"
echo "      from what's committed, the facade wasm or parameters drifted —"
echo "      investigate before committing (it breaks every bookmark)."
'''

[tasks.publish-facade-test]
description = "Publish (PUT) the facade to the local sandbox — first-time publish only"
dependencies = ["build-facade", "sign-facade-state-test"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
WASM="$ROOT/published-contract/facade.wasm"
PARAMS="$ROOT/published-contract/facade.parameters"
STATE="$ROOT/target/facade/facade.state"
[ -f "$WASM" ] && [ -f "$PARAMS" ] || { echo "error: facade wasm/parameters missing — run \`cargo make update-published-facade\` first" >&2; exit 1; }
[ -f "$STATE" ] || { echo "error: $STATE missing — sign-facade-state-test should have produced it" >&2; exit 1; }
PORT="${FREENET_PORT:-7509}"
fdev --port "$PORT" publish --code "$WASM" --parameters "$PARAMS" contract --state "$STATE"
'''

[tasks.publish-facade]
description = "Publish (PUT) the facade to the live network — ONE-TIME prod publish only"
dependencies = ["build-facade", "sign-facade-state"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
WASM="$ROOT/published-contract/facade.wasm"
PARAMS="$ROOT/published-contract/facade.parameters"
STATE="$ROOT/target/facade/facade.state"
[ -f "$WASM" ] && [ -f "$PARAMS" ] || { echo "error: facade wasm/parameters missing — run \`cargo make update-published-facade\` first" >&2; exit 1; }
[ -f "$STATE" ] || { echo "error: $STATE missing — sign-facade-state should have produced it" >&2; exit 1; }
# ONE-SHOT. The facade contract id MUST stay byte-stable forever (it's the
# bookmarkable URL). Per-release pointer flips use `fdev execute update
# --as-state` inside scripts/release.sh, NOT this task.
echo "publishing facade $(cat "$ROOT/published-contract/facade-id.txt") to the live network"
fdev publish --code "$WASM" --parameters "$PARAMS" contract --state "$STATE"
'''

[tasks.update-facade-state-test]
description = "UPDATE the facade state on the local sandbox (per-release pointer flip, test key)"
dependencies = ["sign-facade-state-test"]
script_runner = "bash"
script = '''
set -euo pipefail
ROOT="${CARGO_MAKE_WORKING_DIRECTORY}"
PORT="${FREENET_PORT:-7509}"
FACADE_ID=$(cat "$ROOT/published-contract/facade-id.txt")
STATE="$ROOT/target/facade/facade.state"
echo "UPDATEing facade state at $FACADE_ID (port $PORT)"
# --as-state: the facade update_state only matches UpdateData::State. Without it
# fdev sends UpdateData::Delta and the contract rejects InvalidUpdate.
fdev --port "$PORT" execute update --as-state "$FACADE_ID" "$STATE"
'''
